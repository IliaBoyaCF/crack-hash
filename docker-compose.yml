version: '3.8'

services:
  manager:
    build:
      context: .
      dockerfile: Manager/Api/Dockerfile
    container_name: manager-service
    ports:
      - "5287:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - app-network

  worker-1:
    build:
      context: .
      dockerfile: Worker/Api/Dockerfile
    container_name: worker-1
    ports:
      - "5257:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - app-network

  worker-2:
    build:
      context: .
      dockerfile: Worker/Api/Dockerfile
    container_name: worker-2
    ports:
      - "5258:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - app-network

  worker-3:
    build:
      context: .
      dockerfile: Worker/Api/Dockerfile
    container_name: worker-3
    ports:
      - "5259:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - app-network

  mongo:
    image: mongo:7.0
    container_name: crackhash-mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: crackhash_db
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mongo-data:
    driver: local

networks:
  app-network:
    driver: bridge